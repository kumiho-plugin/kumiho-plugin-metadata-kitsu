name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GIT_TERMINAL_PROMPT: "0"
      GOPROXY: direct
      GONOPROXY: github.com/kumiho-plugin/*
      GONOSUMDB: github.com/kumiho-plugin/*

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(python3 - <<'PY'
            from pathlib import Path
            import re

            text = Path('plugin/plugin.go').read_text()
            match = re.search(r'pluginVer\s*=\s*"([^"]+)"', text)
            print(match.group(1) if match else "")
            PY
            )"
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "failed to resolve version" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Verify plugin version matches tag
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          CODE_VERSION="$(python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('plugin/plugin.go').read_text()
          match = re.search(r'pluginVer\s*=\s*"([^"]+)"', text)
          print(match.group(1) if match else "")
          PY
          )"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "${CODE_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "pluginVer ${CODE_VERSION} does not match tag ${TAG_VERSION}" >&2
            exit 1
          fi

      - name: Build release artifacts
        shell: bash
        run: |
          mkdir -p dist
          VERSION="${{ steps.version.outputs.version }}"
          for arch in amd64 arm64; do
            GOOS=linux GOARCH="${arch}" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" \
              -o "dist/kumiho-plugin-metadata-kitsu_v${VERSION}_linux_${arch}" .
          done
          (
            cd dist
            sha256sum kumiho-plugin-metadata-kitsu_v${VERSION}_linux_amd64 \
              kumiho-plugin-metadata-kitsu_v${VERSION}_linux_arm64 > checksums.txt
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Kitsu Plugin v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/kumiho-plugin-metadata-kitsu_v${{ steps.version.outputs.version }}_linux_amd64
            dist/kumiho-plugin-metadata-kitsu_v${{ steps.version.outputs.version }}_linux_arm64
            dist/checksums.txt
